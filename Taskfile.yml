version: "3"

tasks:
  release:patch:
    desc: Bump patch version, sync skills/plugin version, test, commit, and push.
    cmds:
      - |
        set -euo pipefail

        if ! git diff --quiet || ! git diff --cached --quiet; then
          echo "Working tree must be clean before running release:patch."
          exit 1
        fi

        NEW_VERSION="$(uv run python -c 'import re; from pathlib import Path; p = Path(\"pyproject.toml\"); t = p.read_text(encoding=\"utf-8\"); m = re.search(r\"^version = \\\"(\\d+)\\.(\\d+)\\.(\\d+)\\\"$\", t, flags=re.MULTILINE); assert m, \"Could not find version in pyproject.toml\"; major, minor, patch = map(int, m.groups()); nv = f\"{major}.{minor}.{patch + 1}\"; p.write_text(t[:m.start()] + f\"version = \\\"{nv}\\\"\" + t[m.end():], encoding=\"utf-8\"); print(nv)')"

        echo "Bumped version to ${NEW_VERSION}"
        uv run python scripts/sync_skills.py
        uv run pytest tests/test_cli_api.py tests/test_cli_issue.py tests/test_shell_forgejo_client.py tests/test_cli_task.py tests/test_skill_assets.py
        git add -A
        git -c commit.gpgsign=false commit -m "release: v${NEW_VERSION}"
        git push origin HEAD
